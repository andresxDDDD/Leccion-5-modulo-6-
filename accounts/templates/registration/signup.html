{% extends "base.html" %}

{% block title %}Registrarse{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4">
                <h2 class="card-title text-center mb-4">Registrarse</h2>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuario</label>
                        <input type="text" name="username" id="username" class="form-control" placeholder="Elige un nombre de usuario" required>
                    </div>
                    <div class="mb-3">
                        <label for="password1" class="form-label">Contraseña</label>
                        <input type="password" name="password1" id="password1" class="form-control" placeholder="Crea una contraseña" required>
                    </div>
                    <div class="mb-3">
                        <label for="password2" class="form-label">Confirmar contraseña</label>
                        <input type="password" name="password2" id="password2" class="form-control" placeholder="Repite la contraseña" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg">Registrarse</button>
                    </div>
                </form>

                <p class="text-center mt-3 mb-0">
                    <a href="{% url 'accounts:login' %}">¿Ya tienes cuenta? Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card shadow-sm mt-5 border-danger">
            <div class="card-body p-5">
                <h1 class="display-1 text-danger">403</h1>

        </div>
    </div>

{% endblock %}
